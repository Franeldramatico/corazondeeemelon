<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Te amo mucho araxnita</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><path fill='%23c026d3' d='M50 85L20 50C10 40 10 25 20 15s25-5 30 10c5-15 20-20 30-10s10 25 0 35L50 85z'/></svg>">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Raleway:wght@300;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #020008; overflow: hidden; font-family: 'Raleway', sans-serif; height: 100vh; width: 100vw; user-select: none; }
        #three-container { position: fixed; inset: 0; z-index: 1; }
        .ui-overlay { position: fixed; bottom: 0; left: 0; width: 100%; z-index: 10; display: flex; flex-direction: column; align-items: center; padding-bottom: 30px; pointer-events: none; }
        .love-text {
            font-family: 'Great Vibes', cursive;
            font-size: clamp(2rem, 5vw, 4rem);
            color: #fff;
            text-shadow: 0 0 10px rgba(216, 70, 239, 0.8), 0 2px 4px rgba(0,0,0,0.5);
            text-align: center;
            margin-bottom: 20px;
            padding: 0 10px;
        }
        .btn-open-letter {
            pointer-events: all; cursor: pointer;
            font-family: 'Raleway', sans-serif; font-weight: 500; font-size: 1rem;
            color: #fff; background: #7c3aed;
            border: none; padding: 12px 24px; border-radius: 50px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: transform 0.2s;
        }
        .btn-open-letter:active { transform: scale(0.95); }
        .modal-overlay { position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
        .modal-overlay.active { opacity: 1; pointer-events: all; }
        .letter-card { background: #110022; border: 1px solid #442266; border-radius: 20px; padding: 30px; max-width: 450px; width: 90%; text-align: center; color: #fff; }
        .letter-title { font-size: 1.5rem; margin-bottom: 15px; color: #f472b6; }
        .letter-message { font-size: 1rem; line-height: 1.6; margin-bottom: 15px; font-weight: 300; }
        .btn-close-letter { margin-top: 15px; padding: 8px 20px; border-radius: 20px; border: 1px solid #664488; background: transparent; color: #fff; cursor: pointer; }
    </style>
</head>
<body>
    <div id="three-container"></div>
    <div class="ui-overlay">
        <h1 class="love-text">Te amo mucho araxnita</h1>
        <button class="btn-open-letter" id="btnOpenLetter">Abrir carta ❤️</button>
    </div>
    <div class="modal-overlay" id="modalOverlay">
        <div class="letter-card">
            <div class="letter-title">Mi amor, araxnita</div>
            <p class="letter-message">Este aniversario es solo el primero de muchísimos más juntos. Cada día a tu lado es un regalo.</p>
            <button class="btn-close-letter" id="btnCloseLetter">Cerrar</button>
        </div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 0, 5);

        const renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: 'high-performance' });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(1);
        renderer.setClearColor(0x020008, 1);
        document.getElementById('three-container').appendChild(renderer.domElement);

        function heartImplicit(x, y, z) {
            const x2 = x*x, y2 = y*y, z2 = z*z;
            return Math.pow(x2 + 2.25*y2 + z2 - 1, 3) - x2*z2*z - 0.1125*y2*z2*z;
        }

        const positions = [], colors = [];
        for (let i = 0; i < 40000; i++) {
            const x = Math.random()*3-1.5, y = Math.random()*2-1, z = Math.random()*3-1.5;
            if (heartImplicit(x, y, z) < 0) {
                positions.push(x, z, y);
                colors.push(0.8, 0.2, 0.5);
            }
        }
        const heartGeo = new THREE.BufferGeometry().setAttribute('position', new THREE.BufferAttribute(new Float32Array(positions), 3));
        heartGeo.setAttribute('color', new THREE.BufferAttribute(new Float32Array(colors), 3));
        const heart = new THREE.Points(heartGeo, new THREE.PointsMaterial({ size: 0.03, vertexColors: true, transparent: true, opacity: 0.8 }));
        scene.add(heart);

        const starsPos = [];
        for (let i = 0; i < 500; i++) {
            const r = 10 + Math.random()*20, t = Math.random()*Math.PI*2, p = Math.random()*Math.PI;
            starsPos.push(Math.cos(t)*Math.sin(p)*r, Math.cos(p)*r, Math.sin(t)*Math.sin(p)*r);
        }
        scene.add(new THREE.Points(new THREE.BufferGeometry().setAttribute('position', new THREE.BufferAttribute(new Float32Array(starsPos), 3)), new THREE.PointsMaterial({ size: 0.05, color: 0xffffff })));

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true; controls.autoRotate = true;

        const modal = document.getElementById('modalOverlay');
        document.getElementById('btnOpenLetter').onclick = () => modal.classList.add('active');
        document.getElementById('btnCloseLetter').onclick = () => modal.classList.remove('active');
        window.onresize = () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); };

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
